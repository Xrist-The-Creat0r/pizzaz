[build]
  publish = "."
  functions = "netlify/functions"

# Bundle shared/menu.json with the menu function so it can be read at runtime.
[functions."menu"]
  included_files = ["shared/menu.json"]

# ── API routes → serverless functions ─────────────────────────
[[redirects]]
  from   = "/api/menu"
  to     = "/.netlify/functions/menu"
  status = 200

[[redirects]]
  from   = "/api/upload"
  to     = "/.netlify/functions/upload"
  status = 200

# ── Pretty URLs ───────────────────────────────────────────────
[[redirects]]
  from   = "/"
  to     = "/menu/index.html"
  status = 302

[[redirects]]
  from   = "/menu"
  to     = "/menu/index.html"
  status = 200

[[redirects]]
  from   = "/admin"
  to     = "/admin/index.html"
  status = 200
